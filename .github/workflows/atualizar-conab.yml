name: Atualizar Dados CONAB

on:
  schedule:
    # Roda todos os dias às 09:00 UTC (06:00 no horário de Brasília)
    - cron: '0 9 * * *'
  workflow_dispatch: # Permite rodar manualmente pelo botão no GitHub

jobs:
  build-e-etl:
    runs-on: ubuntu-latest
    
    # Permissão necessária para o bot do GitHub conseguir commitar de volta no repo
    permissions:
      contents: write

    steps:
    - name: Checkout do código
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas openyxl beautifulsoup4

    - name: Executar Script de Download
      run: python conab/baixar_conab.py

    - name: Executar Script de ETL
      run: python conab/etl_conab.py

    - name: Comitar e Enviar Alterações
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add conab_atual.csv dados_consolidados.csv  # Arquivos que mudam
        
        # O comando abaixo evita erro se o script rodar e não houver dados novos
        git diff-index --quiet HEAD || git commit -m "Automação: Atualização diária dos dados CONAB [skip ci]" -a
        git push